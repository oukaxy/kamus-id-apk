name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli

      - name: Add Android platform
        run: npx cap add android

      - name: Sync Capacitor (register plugins)
        run: npx cap sync android

      - name: Patch MainActivity — register Filesystem plugin
        run: |
          MAIN=$(find android -name "MainActivity.java" -o -name "MainActivity.kt" | head -1)
          echo "Found MainActivity: $MAIN"
          if [[ "$MAIN" == *.kt ]]; then
            cat > "$MAIN" << 'KOTLIN'
package com.kamu.id

import android.os.Bundle
import com.getcapacitor.BridgeActivity
import com.capacitorjs.plugins.filesystem.FilesystemPlugin

class MainActivity : BridgeActivity() {
    override fun onCreate(savedInstanceState: Bundle?) {
        registerPlugin(FilesystemPlugin::class.java)
        super.onCreate(savedInstanceState)
    }
}
KOTLIN
          else
            cat > "$MAIN" << 'JAVA'
package com.kamu.id;

import android.os.Bundle;
import com.getcapacitor.BridgeActivity;
import com.capacitorjs.plugins.filesystem.FilesystemPlugin;

public class MainActivity extends BridgeActivity {
    @Override
    public void onCreate(Bundle savedInstanceState) {
        registerPlugin(FilesystemPlugin.class);
        super.onCreate(savedInstanceState);
    }
}
JAVA
          fi

      - name: Beri izin gradlew
        run: chmod +x android/gradlew

      - name: Build APK (debug)
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: kamus-id-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
